# Reduce escape delay (important for nvim inside tmux)
set -sg escape-time 10

# Renumber windows when one is closed
set -g renumber-windows on

# Vi mode for copy
setw -g mode-keys vi

# Fix color issues
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:sitm=\E[3m'
set -as terminal-overrides ',*:ritm=\E[23m'

# Enable cursor shape changes in tmux
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Split panes using "v" and "h"
bind v split-window -v -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Resize panes using Shift-arrow without prefix
bind -n S-Left resize-pane -L
bind -n S-Right resize-pane -R
bind -n S-Up resize-pane -U
bind -n S-Down resize-pane -D

# Toggle status bar
bind s set-option -g status

set -g mouse on

# Smoother scrolling - send 1 line per scroll tick instead of 3
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-prefix-highlight"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n "C-h" if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n "C-j" if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n "C-k" if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n "C-l" if-shell "$is_vim" "send-keys C-l"  "select-pane -R"

bind-key -T copy-mode-vi "C-h" select-pane -L
bind-key -T copy-mode-vi "C-j" select-pane -D
bind-key -T copy-mode-vi "C-k" select-pane -U
bind-key -T copy-mode-vi "C-l" select-pane -R

# Bind C-\ to last window (vim-aware)
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-window -l'

# Theme — minimal, theme-agnostic (uses ANSI palette slots so it adapts to
# whatever colorscheme the terminal has set)
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

set -g status-style "bg=default,fg=default"
# Clear legacy status-bg/fg (override status-style on some tmux versions)
set -g status-bg default
set -g status-fg default
set -g message-style "bg=default,fg=default,bold"
set -g message-command-style "bg=default,fg=default,bold"
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour4"
set -g mode-style "reverse"

set -g window-status-separator ""
set -g window-status-style "bg=default,fg=colour8"
set -g window-status-current-style "bg=default,fg=default,bold"
set -g window-status-last-style "bg=default,fg=colour8"
set -g window-status-activity-style "bg=default,fg=colour8"
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "

# Left: user@host │ session
set -g status-left "#[fg=default,bold]  sam@#h #[fg=colour8]│#[fg=default,bold]  #S #[fg=colour8]│ "

# Right: prefix-indicator  time │ date
set -g status-right "#{prefix_highlight}#[fg=colour8]  #[fg=default]%T #[fg=colour8]│#[fg=colour8]  #[fg=default]%F "

# Keybindings (tmux-yank handles the y/Y copy bindings per-OS)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b "~/.config/tmux/plugins/tpm/tpm"
