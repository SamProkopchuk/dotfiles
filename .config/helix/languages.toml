# Python: use pylsp with pyright for type checking
[[language]]
name = "python"
language-servers = ["pylsp", "pyright"]

# Rust: use rust-analyzer with clippy
[[language]]
name = "rust"
language-servers = ["rust-analyzer"]

[language-server.rust-analyzer.config.check]
command = "clippy"

[language-server.rust-analyzer.config.cargo]
features = "all"

# C/C++: use clangd
[[language]]
name = "c"
language-servers = ["clangd"]

[[language]]
name = "cpp"
language-servers = ["clangd"]
